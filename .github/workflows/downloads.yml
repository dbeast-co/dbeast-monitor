name: Update downloads badge

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-downloads-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate downloads badge JSON
        run: |
          TOTAL=$(curl -s https://grafana.com/api/plugins/dbeast-dbeastmonitor-app/versions \
            | jq '[.items[].downloads] | add')

          mkdir -p docs/badges

          cat > docs/badges/downloads.json <<EOF
          {
            "schemaVersion": 1,
            "label": "downloads",
            "message": "${TOTAL}",
            "color": "red"
          }
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/badges/downloads.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update downloads badge"
            git push
          fi
